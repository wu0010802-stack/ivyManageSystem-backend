name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ivymanagement_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 依賴 CVE 掃描（HIGH-1）
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --strict

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ivymanagement_test
          ENV: development
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        # T9: 加 coverage gate（pyproject.toml [tool.coverage.run] 已設定 source）。
        # 起步門檻 60%：給既有覆蓋率不至於立即 fail，未來逐步提升。
        # --cov-fail-under 用 ratchet 風格：每次提升只能升不能降。
        run: |
          pytest tests/ -v --tb=short -q \
            --cov \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
