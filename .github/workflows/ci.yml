name: Backend CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  audit:
    name: 依賴 CVE 掃描（HIGH-1）
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --strict

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ivymanagement_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ivymanagement_test
          ENV: development
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        # T9: 加 coverage gate（pyproject.toml [tool.coverage.run] 已設定 source）。
        # 起步門檻 60%：給既有覆蓋率不至於立即 fail，未來逐步提升。
        # --cov-fail-under 用 ratchet 風格：每次提升只能升不能降。
        run: |
          pytest tests/ -v --tb=short -q \
            --cov \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  openapi-drift:
    name: OpenAPI Drift Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout ivy-backend
        uses: actions/checkout@v4
        with:
          path: ivy-backend

      - name: Checkout ivy-frontend (sibling)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ivyManageSystem-frontend
          path: ivy-frontend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ivy-backend/requirements.txt

      - name: Install backend deps
        working-directory: ivy-backend
        run: pip install -r requirements.txt

      - name: Dump openapi.json
        working-directory: ivy-backend
        env:
          ENV: development
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        run: python scripts/dump_openapi.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ivy-frontend/package-lock.json

      - name: Install frontend deps
        working-directory: ivy-frontend
        run: npm ci

      - name: Run drift check
        working-directory: ivy-frontend
        run: npm run gen:api:check

  config-gate:
    name: Centralized Settings Gate
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Block os.getenv / os.environ outside config/
        # Phase 1 (2026-05-21) 完成所有 env 集中到 config/ 後啟用。
        # 允許清單：
        #   config/                       — Settings 內部
        #   tests/conftest.py             — autoreset fixture 需要操作 env
        #   tests/spike_rls/              — RLS test fixture 慣例自讀 env
        #   scripts/dump_openapi.py       — CLI 工具，獨立於 FastAPI startup
        #   alembic/env.py                — Alembic CLI，早於 Settings init
        run: |
          if git grep -nE 'os\.(getenv|environ)' -- '*.py' \
               ':!config/' \
               ':!tests/conftest.py' \
               ':!tests/spike_rls/' \
               ':!scripts/dump_openapi.py' \
               ':!alembic/env.py'; then
            echo "::error::os.getenv / os.environ.get 只能在 config/ 與明確 allow-list 內使用"
            echo "::error::請改讀 settings.<domain>.<field>（見 docs/superpowers/specs/2026-05-21-config-centralization-phase1-design.md）"
            exit 1
          fi
          echo "✅ os.getenv allow-list 檢查通過"

  alembic-heads:
    name: Alembic Single Head Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Assert single Alembic head
        env:
          ENV: development
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        run: |
          HEAD_COUNT=$(alembic heads | grep -c '(head)')
          if [ "$HEAD_COUNT" -ne 1 ]; then
            echo "::error::Expected 1 Alembic head, got $HEAD_COUNT"
            alembic heads
            exit 1
          fi
          echo "Single head OK ($HEAD_COUNT)"

  alembic-roundtrip:
    name: Alembic Roundtrip
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ivymanagement_roundtrip
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: HEAD↔baseline roundtrip
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ivymanagement_roundtrip
          ENV: development
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        # Why pkgutil iter over `models/*`: the literal one-liner in the PR2
        # spec (`from models.database import get_engine; Base.metadata.create_all(...)`)
        # only loads the subset of models that `models/database.py` re-exports
        # (e.g. omits `student_log`, `appraisal`, `fees`, `gov_moe`, `year_end`).
        # Production matches via `main.py`'s router-import chain, which
        # transitively imports every model module before `startup/migrations.py`
        # calls `Base.metadata.create_all`. Iterating `models.__path__` is the
        # self-contained equivalent.
        # BASELINE is the alembic revision below which we cannot downgrade
        # (baseline contains only op.alter_column, no create_table). Mirrors
        # startup/migrations.py:ALEMBIC_BASELINE_REVISION; keep them in sync.
        run: |
          BASELINE=4ddf3ebad3e8
          python3 -c "
          import pkgutil, importlib, models
          for m in pkgutil.iter_modules(models.__path__):
              try:
                  importlib.import_module(f'models.{m.name}')
              except Exception as e:
                  raise RuntimeError(f'bootstrap failed importing models.{m.name}: {e}') from e
          from models.base import Base
          from models.database import get_engine
          Base.metadata.create_all(get_engine())
          print(f'create_all OK ({len(Base.metadata.sorted_tables)} tables)')
          "
          alembic stamp heads
          alembic downgrade "$BASELINE"
          alembic upgrade heads
          alembic downgrade "$BASELINE"
          echo "Roundtrip OK"

  alembic-symmetry-lint:
    name: Alembic Symmetry Lint
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run symmetry lint
        run: python3 scripts/lint_alembic_symmetry.py alembic/versions/
