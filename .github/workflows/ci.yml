name: Backend CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  audit:
    name: 依賴 CVE 掃描（HIGH-1）
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --strict

  ruff-lint:
    name: Ruff DTZ Lint Gate
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff DTZ check
        run: ruff check .

  scope-filter-gate:
    name: Scope-Filter Guard (row-level fail-open)
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scope-filter guard
        # 確保每個 gate 用 row-level scope-aware 權限的 API 端點都有套 scope 過濾
        # （portfolio_access helper / assert_all_scope / 明文豁免），堵「gate 放行
        # :own_class 但忘了過濾 → 回全園」的 fail-open。純 stdlib（ast）免裝依賴。
        # 邏輯與 tests/test_scope_filter_guard.py 共用同一支 lint script。
        run: python scripts/lint_scope_filter_guard.py

  test:
    name: Tests (TZ=${{ matrix.container_tz }})
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 2026-05-25: 15→30→60. CI 64% @ 30 min；含 5000+ test + spike_rls auth setup overhead
    # PR1 (2026-05-26) 引入 TZ matrix；當時 UTC leg 暫以 continue-on-error 軟化
    # pre-existing TZ-dependent fail 以解 CI deadlock（spec §7.5 載明「收尾時移除」）。
    # 2026-06-02：datetime cutover 收尾 + 個案修復（如 security_gc 改 now_taipei_naive）後，
    # TZ 敏感 test 在 UTC / Asia/Taipei 已對稱通過 → 移除 continue-on-error，UTC leg
    # 恢復為 blocking gate（防新寫的 datetime.now()/date.today() 偷渡回 codebase；本 CI
    # 在真 PG 雙時區跑全套，補足本地 SQLite 涵蓋不到的 DB 層 server_default/date_trunc）。

    strategy:
      fail-fast: false
      matrix:
        container_tz: [Asia/Taipei, UTC]

    env:
      TZ: ${{ matrix.container_tz }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ivymanagement_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Materialize schema for module-level engine tests
        # 部分 test 在 module top 直接 `_engine = get_engine()` 連 CI 的 PG service
        # 並 inspect 真實 schema（例 test_alembic_audrsk01）。CI 的 PG service container
        # 起來時是空 DB。
        #
        # 不能直接跑 `alembic upgrade heads`：baseline migration `4ddf3ebad3e8`
        # 假設 schema 已存在，從空 DB 跑會 UndefinedTable。生產時 alembic stamp head
        # 對既有 DB 套用後續 migration 才合理。
        #
        # 改用 `Base.metadata.create_all` 從 ORM 模型直接建表（含 audrsk01 加的
        # acknowledged_at / acknowledged_by 等新 column），再 `alembic stamp heads`
        # 把 alembic_version 寫到 head。等價於「prod 升到 head 後的 schema state」。
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ivymanagement_test
          ENV: development
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        run: |
          python -c "from models.database import Base; from models.base import get_engine; Base.metadata.create_all(get_engine())"
          alembic stamp heads

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ivymanagement_test
          ENV: development
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          # spike_rls conftest 預設用 `yilunwu@localhost`（本機 dev 慣例），CI 沒此 superuser
          # → 改指向 service container 的 test:test。fixture 會用此連線 CREATE ROLE
          # rls_spike_parent_login / rls_spike_admin_login（spike 自己的隔離角色，不是 ivy_parent_login）。
          RLS_SPIKE_ADMIN_URL: postgresql://test:test@localhost:5432/ivymanagement_test
        # T9: 加 coverage gate（pyproject.toml [tool.coverage.run] 已設定 source）。
        # 起步門檻 60%：給既有覆蓋率不至於立即 fail，未來逐步提升。
        # --cov-fail-under 用 ratchet 風格：每次提升只能升不能降。
        run: |
          pytest tests/ -v --tb=short -q \
            --cov \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  openapi-drift:
    name: OpenAPI Drift Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout ivy-backend
        uses: actions/checkout@v4
        with:
          path: ivy-backend

      - name: Checkout ivy-frontend (sibling)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ivyManageSystem-frontend
          path: ivy-frontend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ivy-backend/requirements.txt

      - name: Install backend deps
        working-directory: ivy-backend
        run: pip install -r requirements.txt

      - name: Dump openapi.json
        working-directory: ivy-backend
        env:
          ENV: development
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        run: python scripts/dump_openapi.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ivy-frontend/package-lock.json

      - name: Install frontend deps
        working-directory: ivy-frontend
        run: npm ci

      - name: Run drift check
        working-directory: ivy-frontend
        run: npm run gen:api:check

      # 跨 repo 雙寫常數（基本工資/退費門檻/才藝獎金）單側漂移守衛的「後端→前端」方向。
      # 後端 PR 改 shared constant 時，此步拉前端 main 比對即抓到單側漂移。
      # 與前端 ci.yml 的同名步驟對稱，共用 ivy-frontend/scripts/check-shared-constants.mjs。
      # 注意：依賴前端 main 已有 check:shared-constants script（前端分支須先 merge）。
      - name: Check cross-repo shared constants
        working-directory: ivy-frontend
        run: npm run check:shared-constants

  pii-denylist-parity:
    name: PII Denylist Parity Gate (FE/BE)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # CLAUDE.md §8：utils/sentry_init._PII_KEY_SUBSTRINGS 與 ivy-frontend
    # src/utils/sentry.ts PII_KEY_SUBSTRINGS 必須同步，否則 prod 單側洩漏。
    # test_pii_denylist_parity.py 在缺前端 sibling 時會 skip；過去後端 Tests job
    # 無前端 sibling → 此守衛在 CI 永遠 silent skip。本 job 以 sibling layout 讓它真正跑。

    steps:
      - name: Checkout ivy-backend
        uses: actions/checkout@v4
        with:
          path: ivy-backend

      - name: Checkout ivy-frontend (sibling)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ivyManageSystem-frontend
          path: ivy-frontend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ivy-backend/requirements.txt

      - name: Install backend deps
        working-directory: ivy-backend
        run: pip install -r requirements.txt

      - name: Run FE/BE PII denylist parity test
        working-directory: ivy-backend
        env:
          # 缺前端 sibling 時 fail 而非 skip——確保此 gate 真的會跑（見測試 _requires_frontend）。
          PII_PARITY_REQUIRE_FRONTEND: "1"
          ENV: development
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        run: pytest tests/test_pii_denylist_parity.py -v

  permission-parity:
    name: Permission Parity Gate (FE/BE)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # 後端 utils/permissions.Permission enum 與 ivy-frontend
    # src/constants/permissions.ts PERMISSION_NAMES 必須同步，否則前端權限設定 UI
    # 漏列權限、admin 無法在前端把它指派給角色（後端守衛仍在 → fail-closed 不洩漏，
    # 但功能漏接）。test_permission_parity.py 在缺前端 sibling 時會 skip；本 job 以
    # sibling layout + REQUIRE flag 讓它真正跑。對稱於 pii-denylist-parity。
    # 注意：依賴前端 main 已有對應 PERMISSION_NAMES（前端分支須先 merge + push）。

    steps:
      - name: Checkout ivy-backend
        uses: actions/checkout@v4
        with:
          path: ivy-backend

      - name: Checkout ivy-frontend (sibling)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ivyManageSystem-frontend
          path: ivy-frontend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ivy-backend/requirements.txt

      - name: Install backend deps
        working-directory: ivy-backend
        run: pip install -r requirements.txt

      - name: Run FE/BE Permission parity test
        working-directory: ivy-backend
        env:
          # 缺前端 sibling 時 fail 而非 skip——確保此 gate 真的會跑（見測試 _requires_frontend）。
          PERMISSION_PARITY_REQUIRE_FRONTEND: "1"
          ENV: development
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        run: pytest tests/test_permission_parity.py -v

  config-gate:
    name: Centralized Settings Gate
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Block os.getenv / os.environ outside config/
        # Phase 1 (2026-05-21) 完成所有 env 集中到 config/ 後啟用。
        # 允許清單：
        #   config/                            — Settings 內部
        #   tests/conftest.py                  — autoreset fixture 需要操作 env
        #   tests/spike_rls/                   — RLS test fixture 慣例自讀 env
        #   scripts/dump_openapi.py            — CLI 工具，獨立於 FastAPI startup
        #   scripts/dr_storage_sync.py         — DR CLI 工具，GH Actions 跑無 DB 依賴
        #   scripts/encrypt_medical_fields.py  — 醫療欄位加密 backfill CLI，獨立讀 encryption key env
        #   alembic/env.py                     — Alembic CLI，早於 Settings init
        #   alembic/versions/                  — migration 一次性 runtime config（如 backfill 寬限期），
        #                                       migration 本身不可 import settings（runtime ordering）。
        #   tests/test_pii_denylist_parity.py  — 讀 CI-only flag PII_PARITY_REQUIRE_FRONTEND
        #                                       （缺前端 sibling 時 fail 而非 skip），非 app runtime config。
        #   tests/test_permission_parity.py    — 同上，讀 PERMISSION_PARITY_REQUIRE_FRONTEND /
        #                                       PERMISSION_PARITY_FRONTEND（CI-only flag），非 app runtime config。
        run: |
          if git grep -nE 'os\.(getenv|environ)' -- '*.py' \
               ':!config/' \
               ':!tests/conftest.py' \
               ':!tests/spike_rls/' \
               ':!tests/test_pii_denylist_parity.py' \
               ':!tests/test_permission_parity.py' \
               ':!scripts/dump_openapi.py' \
               ':!scripts/dr_storage_sync.py' \
               ':!scripts/encrypt_medical_fields.py' \
               ':!alembic/env.py' \
               ':!alembic/versions/'; then
            echo "::error::os.getenv / os.environ.get 只能在 config/ 與明確 allow-list 內使用"
            echo "::error::請改讀 settings.<domain>.<field>（見 docs/superpowers/specs/2026-05-21-config-centralization-phase1-design.md）"
            exit 1
          fi
          echo "✅ os.getenv allow-list 檢查通過"

  money-rounding-gate:
    name: Money Rounding Gate (round_half_up)
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Block builtin round() in money paths
        # 2026-05-25 rollout：金額計算統一用 utils.rounding.round_half_up，
        # 避免 Python round() ROUND_HALF_EVEN（銀行家進位）與政府/勞健保/
        # PG NUMERIC ROUND_HALF_UP 在 .5 邊界 50% 翻盤。
        #
        # 純金額路徑（賭注最高，blanket forbid builtin round）：
        #   services/salary/        薪資 engine 全套
        #   services/finance/       財報 / 退費 / 才藝老師薪資
        #   services/insurance_service.py        勞健保計算
        #   services/overtime_pay_calculator.py  加班費
        #   services/transfer_roster.py          銀行轉帳名冊
        #   services/offboarding/   離職結算（unused_leave_payout 折現 daily_wage × days）
        #   api/gov_reports.py      政府申報書 ★最關鍵
        #   api/salary/             試算 / 手動調整
        #
        # 混合用途檔（hours/ratios 也用 round，不納入此 gate）：
        #   api/{employees,exports,reports}.py
        #   api/attendance/, api/portal/, api/recruitment/
        #   仰賴 code review 把關新增金額 round()
        run: |
          if git grep -nE '(^|[^_a-zA-Z])round\(' -- \
               'services/salary/**.py' \
               'services/finance/**.py' \
               'services/insurance_service.py' \
               'services/overtime_pay_calculator.py' \
               'services/transfer_roster.py' \
               'services/offboarding/**.py' \
               'api/gov_reports.py' \
               'api/salary/**.py'; then
            echo "::error::金額路徑禁用 builtin round()（HALF_EVEN）"
            echo "::error::請改用 from utils.rounding import round_half_up（ROUND_HALF_UP 對齊政府/勞健保標準）"
            echo "::error::Refs: utils/rounding.py docstring + audit `.scratch/decimal_audit/audit_report.md`"
            exit 1
          fi
          echo "✅ Money rounding gate passed"

  alembic-heads:
    name: Alembic Single Head Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Assert single Alembic head
        env:
          ENV: development
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        run: |
          HEAD_COUNT=$(alembic heads | grep -c '(head)')
          if [ "$HEAD_COUNT" -ne 1 ]; then
            echo "::error::Expected 1 Alembic head, got $HEAD_COUNT"
            alembic heads
            exit 1
          fi
          echo "Single head OK ($HEAD_COUNT)"

  alembic-roundtrip:
    name: Alembic Roundtrip
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ivymanagement_roundtrip
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Per-migration up/down via pytest
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ivymanagement_roundtrip
          ENV: development
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        # 2026-05-25 重設計：原 stamp + downgrade chain 假設整條 history 健全，
        # 但多個歷史 migration（pretent001/parlsr*/...）的 downgrade 不寫
        # IF EXISTS → chronic CI fail since 2026-05-22。同時 alembic 相對 `-N`
        # 無法解析含 merge points (mergeheads01/02) 的 graph。
        #
        # 改為：each PR 寫 migration 時要附對應 pytest（已落地 pattern：
        # `tests/notification/test_migration_notif01.py` 動態載 module 跑 upgrade()
        # + downgrade() 對 SQLite 驗對稱）。CI 此 job 跑全部 migration 測試。
        #
        # 若某 PR 加 migration 但漏寫測試 → CI 不會抓到，但這是 design rule 不是
        # gate trick；workspace CLAUDE.md 已記載「新 migration 必補對稱 pytest」。
        run: |
          pytest tests/ -v -k "test_migration" --tb=short 2>&1 | tail -30
          echo "✅ Per-migration roundtrip OK"

  alembic-symmetry-lint:
    name: Alembic Symmetry Lint
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run symmetry lint
        run: python3 scripts/lint_alembic_symmetry.py alembic/versions/

  notification-dispatch-gate:
    name: Notification Dispatch Gate (forbid line_service.notify_*)
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Block direct line_service.notify_* in api/ services/
        # 2026-05-26 Phase 2 PR-D 落地：所有通知 caller 必須走
        # services.notification.dispatch.enqueue；line_service.{,_}notify_*
        # 與 _push_to_user 改為 dispatch._channels.line / hybrid caller 私有 API。
        #
        # 允許 path（line_service 內部與 dispatch 內部互呼）：
        #   services/line_service.py    — method 自己定義在此
        #   services/notification/_channels/  — dispatch LINE adapter
        #
        # Phase 4 收尾（2026-05-26）：
        #   - Section 2: dismissal_calls.py 改走 dispatch.enqueue(line_group_id="")
        #   - Section 3: reports.py 改走 dispatch.send_to_line_user_sync
        # exception list 已清空；所有 LINE 推送 caller 統一走 dispatch API。
        run: |
          # 1. 禁直接 line_service.{,_}notify_* / line_svc.{,_}notify_*
          PAT='_?line_(service|svc)\._?notify_'
          MATCH=$(git grep -nE "$PAT" -- 'api/**.py' 'services/**.py' \
            ':!services/line_service.py' \
            ':!services/notification/_channels/' \
            || true)
          if [ -n "$MATCH" ]; then
            echo "::error::禁直接 line_service.notify_* / _notify_*（請改用 dispatch.enqueue）："
            echo "$MATCH"
            exit 1
          fi
          echo "✅ 無 disallowed line_service.{,_}notify_* caller"

          # 2. 禁 push_to_user 直接 caller
          PAT2='_?line_service\.push_to_user|_?line_svc\.push_to_user'
          MATCH2=$(git grep -nE "$PAT2" -- 'api/**.py' 'services/**.py' \
            ':!services/line_service.py' \
            ':!services/notification/_channels/' \
            || true)
          if [ -n "$MATCH2" ]; then
            echo "::error::禁直接 line_service.push_to_user（請改用 dispatch.send_to_line_user_sync 或 dispatch.enqueue）："
            echo "$MATCH2"
            exit 1
          fi
          echo "✅ 無 disallowed push_to_user caller"

  response-model-gate:
    name: Response Model Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run check_response_model_coverage.py
        # Phase 1.5+（2026-05-28）：每個 router endpoint 須帶 response_model=（避免 prod schema 漂移 + 前端
        # gen:api 出 unknown）。Grandfather list 在 `.grandfather-no-response-model`，
        # script 拒絕 grandfather 變長（origin/main diff 多新 row 即 fail）。
        run: python3 scripts/check_response_model_coverage.py

  pii-schemas-gate:
    name: PII in *Out Schemas Gate
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps
        # check_pii_in_schemas.py 透過 utils.sentry_init 拿 denylist substring，
        # 因此最少要有 pydantic + pydantic-settings 才能 import config（lazy proxy）。
        run: pip install pydantic pydantic-settings

      - name: Run check_pii_in_schemas.py
        # 禁 schemas/ 下 *Out 類別欄位命中 PII denylist；例外用 `# pii-allow: <reason>` inline 註解。
        run: python3 scripts/check_pii_in_schemas.py

  naked-rate-limiter-gate:
    name: Forbid naked SlidingWindowLimiter() in api/ services/
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Grep naked SlidingWindowLimiter() usage
        # 2026-05-28 Task 3（Spec A PR-A3）：所有 rate limiter 建立必走
        # utils/rate_limit.py 的 create_limiter() factory；禁用裸 SlidingWindowLimiter()。
        # factory 自動打發 backend dispatch（memory vs PostgreSQL）+ 初始化語義。
        #
        # 允許 path（factory 定義處 + 測試）：
        #   utils/rate_limit.py     — 定義 create_limiter() factory 本身
        #   tests/                  — pytest 對 factory 的 isinstance 檢查、roundtrip 驗證
        # （透過 grep --include="*.py" api/ services/ 自然排除上述路徑）
        run: |
          set -e
          if grep -rn --include="*.py" "SlidingWindowLimiter(" api/ services/ 2>/dev/null; then
            echo "::error::Forbid naked SlidingWindowLimiter() in api/ or services/"
            echo "::error::Please use create_limiter() factory from utils.rate_limit instead."
            echo "::error::See utils/rate_limit.py:163+ for backend dispatch (memory/postgres) logic."
            echo "::error::Spec: docs/superpowers/specs/2026-05-28-rate-limit-hardening-design.md §3.6"
            exit 1
          fi
          echo "✅ OK: no naked SlidingWindowLimiter() in api/ or services/"
