name: Backend CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  audit:
    name: 依賴 CVE 掃描（HIGH-1）
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --strict

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 2026-05-25: 15→30→60. CI 64% @ 30 min；含 5000+ test + spike_rls auth setup overhead

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ivymanagement_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ivymanagement_test
          ENV: development
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        # T9: 加 coverage gate（pyproject.toml [tool.coverage.run] 已設定 source）。
        # 起步門檻 60%：給既有覆蓋率不至於立即 fail，未來逐步提升。
        # --cov-fail-under 用 ratchet 風格：每次提升只能升不能降。
        run: |
          pytest tests/ -v --tb=short -q \
            --cov \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  openapi-drift:
    name: OpenAPI Drift Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout ivy-backend
        uses: actions/checkout@v4
        with:
          path: ivy-backend

      - name: Checkout ivy-frontend (sibling)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ivyManageSystem-frontend
          path: ivy-frontend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ivy-backend/requirements.txt

      - name: Install backend deps
        working-directory: ivy-backend
        run: pip install -r requirements.txt

      - name: Dump openapi.json
        working-directory: ivy-backend
        env:
          ENV: development
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        run: python scripts/dump_openapi.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ivy-frontend/package-lock.json

      - name: Install frontend deps
        working-directory: ivy-frontend
        run: npm ci

      - name: Run drift check
        working-directory: ivy-frontend
        run: npm run gen:api:check

  config-gate:
    name: Centralized Settings Gate
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Block os.getenv / os.environ outside config/
        # Phase 1 (2026-05-21) 完成所有 env 集中到 config/ 後啟用。
        # 允許清單：
        #   config/                       — Settings 內部
        #   tests/conftest.py             — autoreset fixture 需要操作 env
        #   tests/spike_rls/              — RLS test fixture 慣例自讀 env
        #   scripts/dump_openapi.py       — CLI 工具，獨立於 FastAPI startup
        #   alembic/env.py                — Alembic CLI，早於 Settings init
        run: |
          if git grep -nE 'os\.(getenv|environ)' -- '*.py' \
               ':!config/' \
               ':!tests/conftest.py' \
               ':!tests/spike_rls/' \
               ':!scripts/dump_openapi.py' \
               ':!alembic/env.py'; then
            echo "::error::os.getenv / os.environ.get 只能在 config/ 與明確 allow-list 內使用"
            echo "::error::請改讀 settings.<domain>.<field>（見 docs/superpowers/specs/2026-05-21-config-centralization-phase1-design.md）"
            exit 1
          fi
          echo "✅ os.getenv allow-list 檢查通過"

  money-rounding-gate:
    name: Money Rounding Gate (round_half_up)
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Block builtin round() in money paths
        # 2026-05-25 rollout：金額計算統一用 utils.rounding.round_half_up，
        # 避免 Python round() ROUND_HALF_EVEN（銀行家進位）與政府/勞健保/
        # PG NUMERIC ROUND_HALF_UP 在 .5 邊界 50% 翻盤。
        #
        # 純金額路徑（賭注最高，blanket forbid builtin round）：
        #   services/salary/        薪資 engine 全套
        #   services/finance/       財報 / 退費 / 才藝老師薪資
        #   services/insurance_service.py        勞健保計算
        #   services/overtime_pay_calculator.py  加班費
        #   services/transfer_roster.py          銀行轉帳名冊
        #   services/offboarding/   離職結算（unused_leave_payout 折現 daily_wage × days）
        #   api/gov_reports.py      政府申報書 ★最關鍵
        #   api/salary/             試算 / 手動調整
        #
        # 混合用途檔（hours/ratios 也用 round，不納入此 gate）：
        #   api/{employees,exports,reports}.py
        #   api/attendance/, api/portal/, api/recruitment/
        #   仰賴 code review 把關新增金額 round()
        run: |
          if git grep -nE '(^|[^_a-zA-Z])round\(' -- \
               'services/salary/**.py' \
               'services/finance/**.py' \
               'services/insurance_service.py' \
               'services/overtime_pay_calculator.py' \
               'services/transfer_roster.py' \
               'services/offboarding/**.py' \
               'api/gov_reports.py' \
               'api/salary/**.py'; then
            echo "::error::金額路徑禁用 builtin round()（HALF_EVEN）"
            echo "::error::請改用 from utils.rounding import round_half_up（ROUND_HALF_UP 對齊政府/勞健保標準）"
            echo "::error::Refs: utils/rounding.py docstring + audit `.scratch/decimal_audit/audit_report.md`"
            exit 1
          fi
          echo "✅ Money rounding gate passed"

  alembic-heads:
    name: Alembic Single Head Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Assert single Alembic head
        env:
          ENV: development
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        run: |
          HEAD_COUNT=$(alembic heads | grep -c '(head)')
          if [ "$HEAD_COUNT" -ne 1 ]; then
            echo "::error::Expected 1 Alembic head, got $HEAD_COUNT"
            alembic heads
            exit 1
          fi
          echo "Single head OK ($HEAD_COUNT)"

  alembic-roundtrip:
    name: Alembic Roundtrip
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ivymanagement_roundtrip
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Per-migration up/down via pytest
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ivymanagement_roundtrip
          ENV: development
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        # 2026-05-25 重設計：原 stamp + downgrade chain 假設整條 history 健全，
        # 但多個歷史 migration（pretent001/parlsr*/...）的 downgrade 不寫
        # IF EXISTS → chronic CI fail since 2026-05-22。同時 alembic 相對 `-N`
        # 無法解析含 merge points (mergeheads01/02) 的 graph。
        #
        # 改為：each PR 寫 migration 時要附對應 pytest（已落地 pattern：
        # `tests/notification/test_migration_notif01.py` 動態載 module 跑 upgrade()
        # + downgrade() 對 SQLite 驗對稱）。CI 此 job 跑全部 migration 測試。
        #
        # 若某 PR 加 migration 但漏寫測試 → CI 不會抓到，但這是 design rule 不是
        # gate trick；workspace CLAUDE.md 已記載「新 migration 必補對稱 pytest」。
        run: |
          pytest tests/ -v -k "test_migration" --tb=short 2>&1 | tail -30
          echo "✅ Per-migration roundtrip OK"

  alembic-symmetry-lint:
    name: Alembic Symmetry Lint
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run symmetry lint
        run: python3 scripts/lint_alembic_symmetry.py alembic/versions/

  notification-dispatch-gate:
    name: Notification Dispatch Gate (forbid line_service.notify_*)
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Block direct line_service.notify_* in api/ services/
        # 2026-05-26 Phase 2 PR-D 落地：所有通知 caller 必須走
        # services.notification.dispatch.enqueue；line_service.{,_}notify_*
        # 與 _push_to_user 改為 dispatch._channels.line / hybrid caller 私有 API。
        #
        # 允許 path（line_service 內部與 dispatch 內部互呼）：
        #   services/line_service.py    — method 自己定義在此
        #   services/notification/_channels/  — dispatch LINE adapter
        #
        # Phase 4 收尾（2026-05-26）：
        #   - Section 2: dismissal_calls.py 改走 dispatch.enqueue(line_group_id="")
        #   - Section 3: reports.py 改走 dispatch.send_to_line_user_sync
        # exception list 已清空；所有 LINE 推送 caller 統一走 dispatch API。
        run: |
          # 1. 禁直接 line_service.{,_}notify_* / line_svc.{,_}notify_*
          PAT='_?line_(service|svc)\._?notify_'
          MATCH=$(git grep -nE "$PAT" -- 'api/**.py' 'services/**.py' \
            ':!services/line_service.py' \
            ':!services/notification/_channels/' \
            || true)
          if [ -n "$MATCH" ]; then
            echo "::error::禁直接 line_service.notify_* / _notify_*（請改用 dispatch.enqueue）："
            echo "$MATCH"
            exit 1
          fi
          echo "✅ 無 disallowed line_service.{,_}notify_* caller"

          # 2. 禁 push_to_user 直接 caller
          PAT2='_?line_service\.push_to_user|_?line_svc\.push_to_user'
          MATCH2=$(git grep -nE "$PAT2" -- 'api/**.py' 'services/**.py' \
            ':!services/line_service.py' \
            ':!services/notification/_channels/' \
            || true)
          if [ -n "$MATCH2" ]; then
            echo "::error::禁直接 line_service.push_to_user（請改用 dispatch.send_to_line_user_sync 或 dispatch.enqueue）："
            echo "$MATCH2"
            exit 1
          fi
          echo "✅ 無 disallowed push_to_user caller"
